<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Klidný Táta 2.4</title>
    <style>
        :root {
            --bg: #0f172a; --card: #1e293b; --primary: #52b788; --accent: #3b82f6;
            --danger: #ef4444; --text: #f1f5f9; --text-dim: #94a3b8;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, system-ui, sans-serif; background-color: var(--bg); color: var(--text); padding-bottom: 40px; }
        .container { width: 100%; max-width: 480px; margin: 0 auto; padding: 20px; display: flex; flex-direction: column; gap: 20px; }
        header { text-align: center; padding: 10px 0; }
        header h1 { font-size: 1rem; font-weight: 300; letter-spacing: 3px; color: var(--text-dim); text-transform: uppercase; }
        
        .sos-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .sos-btn { padding: 20px; border-radius: 20px; text-align: center; font-weight: bold; cursor: pointer; border: 2px solid; transition: 0.2s; }
        .sos-anger { border-color: var(--danger); color: var(--danger); background: rgba(239, 68, 68, 0.1); }
        .sos-anxiety { border-color: var(--accent); color: var(--accent); background: rgba(59, 130, 246, 0.1); }
        
        .card { background: var(--card); border-radius: 24px; padding: 20px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3); }
        .label { font-size: 0.75rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; display: block; }
        
        .action-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .action-btn { background: #334155; border: none; padding: 15px; border-radius: 12px; color: white; cursor: pointer; font-size: 0.85rem; display: flex; align-items: center; justify-content: center; gap: 8px; text-decoration: none; text-align: center; }
        
        textarea, select { width: 100%; background: #0f172a; border: 1px solid #334155; border-radius: 12px; color: white; padding: 12px; margin-bottom: 10px; font-family: inherit; font-size: 1rem; }
        .save-btn { background: var(--primary); color: #0f172a; border: none; padding: 15px; border-radius: 12px; width: 100%; font-weight: bold; cursor: pointer; }
        
        .history-item { padding: 10px; border-bottom: 1px solid #334155; font-size: 0.85rem; line-height: 1.4; }
        
        #sos-modal { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 2000; flex-direction: column; align-items: center; justify-content: center; padding: 30px; text-align: center; }
        .breath-circle { width: 140px; height: 140px; background: var(--primary); border-radius: 50%; box-shadow: 0 0 50px var(--primary); margin-bottom: 40px; }
        .animate-anger { animation: bAnger 6s infinite ease-in-out; }
        .animate-anxiety { animation: bAnxiety 12s infinite ease-in-out; }
        @keyframes bAnger { 0%, 100% { transform: scale(1); } 50% { transform: scale(2.2); } }
        @keyframes bAnxiety { 0%, 100% { transform: scale(1); } 40%, 60% { transform: scale(2.5); } }
        .close-sos { margin-top: 40px; color: var(--text-dim); text-decoration: underline; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <header><h1>Klidný Táta 2.4</h1></header>

    <div class="sos-grid">
        <div class="sos-btn sos-anger" onclick="startSOS('anger')">🔥 VZTEK</div>
        <div class="sos-btn sos-anxiety" onclick="startSOS('anxiety')">🌪️ ÚZKOST</div>
    </div>

    <div class="action-row">
        <!-- NOVÝ OVĚŘENÝ ODKAZ NA 10 HODIN DEŠTĚ -->
        <a href="https://www.youtube.com/watch?v=tj9d6ahu4_4" target="_blank" class="action-btn">
            <span>🌧️</span> Déšť (YouTube)
        </a>
        <button class="action-btn" onclick="sendSignal()">
            <span>❤️</span> Signál pro ni
        </button>
    </div>

    <section class="card">
        <span class="label">Mise na dnešek</span>
        <div id="task-me" style="margin-bottom:10px;"><b>PRO MĚ:</b> <p>Načítání...</p></div>
        <div id="task-her"><b>PRO NI:</b> <p>Načítání...</p></div>
    </section>

    <section class="card">
        <span class="label">Večerní zápis</span>
        <select id="anger-level">
            <option value="0">Vztek: 0 - Klid</option>
            <option value="1">1 - Podráždění</option>
            <option value="2">2 - Prodýcháno</option>
            <option value="3">3 - Hlasitější</option>
            <option value="4">4 - Výbuch</option>
            <option value="5">5 - Zkrat</option>
        </select>
        <textarea id="note" rows="2" placeholder="Důvod vzteku / Jak jsi ji podpořil?"></textarea>
        <button class="save-btn" onclick="saveEntry()">Uložit den</button>
    </section>

    <section class="card">
        <span class="label">Historie</span>
        <div id="history-list"></div>
    </section>
</div>

<div id="sos-modal">
    <div id="breath-circle" class="breath-circle"></div>
    <h2 id="sos-instruction" style="font-weight:300;">Dýchej s kruhem...</h2>
    <div class="close-sos" onclick="stopSOS()">Zavřít</div>
</div>

<script>
    const tasksMe = [
        "Zůstaň 5 minut v autě před domem.",
        "Dnes večer odlož telefon do šuplíku.",
        "Než odpovíš na výčitku, 3x hluboký nádech.",
        "Studená sprcha hned po příchodu domů.",
        "Mluv dnes o 20 % tišeji než obvykle."
    ];
    const tasksHer = [
        "Uvař jí čaj bez ptaní.",
        "Vyzvedni dvojčata na 20 minut ven.",
        "Umyj nádobí po večeři sám.",
        "Napiš jí zprávu: 'Jsi skvělá, večer ti pomůžu'.",
        "Dnes ji 15 minut jen poslouchej bez rad."
    ];

    function sendSignal() {
        const msg = "Ahoj lasko, moc na tebe myslim. Jsi statecna. Večer jsem v tom s tebou. ❤️";
        const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
        const link = isIOS ? `sms:&body=${encodeURIComponent(msg)}` : `sms:?body=${encodeURIComponent(msg)}`;
        
        if (/Android|iPhone|iPad|iPod/i.test(navigator.userAgent)) {
            window.location.href = link;
        } else {
            alert("Funkční pouze v mobilu. Text: " + msg);
        }
    }

    function startSOS(type) {
        document.getElementById('sos-modal').style.display = 'flex';
        const circle = document.getElementById('breath-circle');
        circle.className = 'breath-circle ' + (type === 'anger' ? 'animate-anger' : 'animate-anxiety');
        document.getElementById('sos-instruction').innerText = type === 'anger' ? "DÝCHEJ S KRUHEM (VZTEK)" : "POMALÉ UVOLNĚNÍ (ÚZKOST)";
    }
    function stopSOS() { document.getElementById('sos-modal').style.display = 'none'; }

    function saveEntry() {
        const entry = {
            date: new Date().toLocaleDateString(),
            anger: document.getElementById('anger-level').value,
            note: document.getElementById('note').value
        };
        let logs = JSON.parse(localStorage.getItem('calm_logs') || '[]');
        logs.push(entry);
        localStorage.setItem('calm_logs', JSON.stringify(logs));
        alert("Zapsáno.");
        document.getElementById('note').value = "";
        updateStats();
    }

    function updateStats() {
        const logs = JSON.parse(localStorage.getItem('calm_logs') || '[]');
        const list = document.getElementById('history-list');
        list.innerHTML = logs.slice().reverse().map(l => `
            <div class="history-item">
                <b>${l.date}</b>: Vztek ${l.anger}/5<br>
                <i style="color:var(--text-dim)">${l.note || 'Bez poznámky'}</i>
            </div>
        `).join('') || '<p style="color:var(--text-dim); font-size:0.8rem">Zatím žádné záznamy.</p>';
    }

    window.onload = function() {
        const day = new Date().getDate() % tasksMe.length;
        document.getElementById('task-me').querySelector('p').innerText = tasksMe[day];
        document.getElementById('task-her').querySelector('p').innerText = tasksHer[day % tasksHer.length];
        updateStats();
    };
</script>
</body>
</html>
