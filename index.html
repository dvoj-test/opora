<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Klidný Táta 3.2</title>
    <style>
        :root {
            --bg: #0f172a; --card: #1e293b; --primary: #52b788; --accent: #3b82f6;
            --danger: #ef4444; --text: #f1f5f9; --text-dim: #94a3b8; --gold: #fbc02d;
            --anxiety-color: #a855f7;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, system-ui, sans-serif; background-color: var(--bg); color: var(--text); padding-bottom: 60px; }
        .container { width: 100%; max-width: 480px; margin: 0 auto; padding: 15px; display: flex; flex-direction: column; gap: 20px; }
        
        header { text-align: center; padding: 10px 0; display: flex; justify-content: space-between; align-items: center; }
        header h1 { font-size: 0.9rem; font-weight: 300; letter-spacing: 2px; color: var(--text-dim); text-transform: uppercase; }

        .battery-header { display: flex; align-items: center; gap: 10px; background: rgba(255,255,255,0.05); padding: 10px 15px; border-radius: 15px; }
        .bat-box { width: 40px; height: 20px; border: 2px solid var(--text-dim); border-radius: 4px; position: relative; padding: 2px; }
        .bat-box::after { content: ''; position: absolute; right: -6px; top: 4px; width: 4px; height: 8px; background: var(--text-dim); border-radius: 0 2px 2px 0; }
        .bat-fill { height: 100%; background: var(--primary); width: 0%; transition: width 1s; }

        .sos-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
        .sos-btn { padding: 15px 5px; border-radius: 15px; text-align: center; font-weight: bold; cursor: pointer; border: 2px solid; font-size: 0.75rem; transition: 0.2s; }
        .sos-anger { border-color: var(--danger); color: var(--danger); background: rgba(239, 68, 68, 0.1); }
        .sos-anxiety { border-color: var(--accent); color: var(--accent); background: rgba(59, 130, 246, 0.1); }
        .sos-ground { border-color: var(--gold); color: var(--gold); background: rgba(251, 192, 45, 0.1); }

        .card { background: var(--card); border-radius: 20px; padding: 18px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3); }
        .label { font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; display: block; }
        
        .action-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .action-btn { background: #334155; border: none; padding: 12px; border-radius: 12px; color: white; cursor: pointer; font-size: 0.8rem; display: flex; align-items: center; justify-content: center; gap: 8px; text-decoration: none; }
        .btn-report { background: var(--gold) !important; color: #0f172a !important; font-weight: bold; grid-column: span 2; }

        .rating-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        textarea, select { width: 100%; background: #0f172a; border: 1px solid #334155; border-radius: 10px; color: white; padding: 10px; font-family: inherit; font-size: 0.9rem; margin-bottom: 10px; }
        .save-btn { background: var(--primary); color: #0f172a; border: none; padding: 14px; border-radius: 12px; width: 100%; font-weight: bold; cursor: pointer; }

        .history-item { font-size: 0.8rem; border-bottom: 1px solid #334155; padding: 10px 0; }
        .tag { display: inline-block; padding: 2px 6px; border-radius: 4px; font-size: 0.65rem; font-weight: bold; margin-right: 5px; }
        .tag-anger { background: rgba(239, 68, 68, 0.2); color: var(--danger); }
        .tag-anxiety { background: rgba(168, 85, 247, 0.2); color: var(--anxiety-color); }

        #sos-modal, #report-modal { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 2000; flex-direction: column; align-items: center; justify-content: center; padding: 25px; text-align: center; overflow-y: auto; }
        .breath-circle { width: 130px; height: 130px; background: var(--primary); border-radius: 50%; box-shadow: 0 0 50px var(--primary); margin-bottom: 40px; }
        .animate-anger { animation: bAnger 6s infinite ease-in-out; }
        .animate-anxiety { animation: bAnxiety 12s infinite ease-in-out; }
        @keyframes bAnger { 0%, 100% { transform: scale(1); } 50% { transform: scale(2.2); } }
        @keyframes bAnxiety { 0%, 100% { transform: scale(1); } 40%, 60% { transform: scale(2.5); } }
        .close-btn { margin-top: 30px; color: var(--text-dim); text-decoration: underline; cursor: pointer; padding: 10px; }
        
        /* REPORT STYLES */
        .report-content { text-align: left; background: var(--card); padding: 20px; border-radius: 20px; width: 100%; max-width: 400px; }
        .summary-title { color: var(--gold); font-weight: bold; margin-bottom: 10px; display: block; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Klidný Táta 3.2</h1>
        <div class="battery-header">
            <div class="bat-box"><div id="bat-fill" class="bat-fill"></div></div>
            <span id="streak-days" style="font-size: 0.8rem; font-weight: bold; color: var(--primary);">0 dní</span>
        </div>
    </header>

    <div class="sos-grid">
        <div class="sos-btn sos-anger" onclick="startSOS('anger')">🔥 VZTEK</div>
        <div class="sos-btn sos-anxiety" onclick="startSOS('anxiety')">🌪️ ÚZKOST</div>
        <div class="sos-btn sos-ground" onclick="startSOS('ground')">🧱 UZEMNĚNÍ</div>
    </div>

    <div class="action-row">
        <a href="https://www.youtube.com/results?search_query=rain+sounds+for+sleeping+no+ads" target="_blank" class="action-btn">🌧️ Déšť</a>
        <button class="action-btn" onclick="sendSignal()">❤️ Signál pro ni</button>
        <button class="action-btn btn-report" onclick="generateReport()">📊 TÝDENNÍ REPORT ANALÝZA</button>
    </div>

    <section class="card">
        <span class="label">Mise dne</span>
        <div id="task-me"><b>PRO MĚ:</b> <p>Načítání...</p></div>
        <div id="task-her" style="margin-top:10px;"><b>PRO NI:</b> <p>Načítání...</p></div>
    </section>

    <section class="card">
        <span class="label">Dnešní záznam</span>
        <div class="rating-grid">
            <div class="form-group">
                <label class="label">Vztek (reakce)</label>
                <select id="anger-level"><option value="0">0 - Klid</option><option value="1">1 - Mírný</option><option value="3">3 - Výbuch</option><option value="5">5 - Zkrat</option></select>
            </div>
            <div class="form-group">
                <label class="label">Úzkost (vnitřní)</label>
                <select id="anxiety-level"><option value="0">0 - Pohoda</option><option value="1">1 - Tlak</option><option value="3">3 - Sevření</option><option value="5">5 - Panika</option></select>
            </div>
        </div>
        <textarea id="victory" rows="1" placeholder="Dnešní vítězství (kdy jsem to zvládl)?"></textarea>
        <textarea id="note" rows="1" placeholder="Jak jsem dnes podpořil ženu?"></textarea>
        <button class="save-btn" onclick="saveEntry()">Uložit den & dobít baterii</button>
    </section>

    <section class="card">
        <span class="label">Poslední záznamy</span>
        <div id="history-list" style="max-height: 150px; overflow-y: auto;"></div>
    </section>
</div>

<!-- SOS MODAL -->
<div id="sos-modal">
    <div class="breath-circle" id="breath-circle"></div>
    <h2 id="sos-instruction" style="font-weight:300;"></h2>
    <div class="close-btn" onclick="stopSOS()">Zavřít</div>
</div>

<!-- REPORT MODAL -->
<div id="report-modal">
    <div class="report-content" id="report-body">
        <!-- Zde se vygeneruje report -->
    </div>
    <div class="close-btn" onclick="document.getElementById('report-modal').style.display='none'">Zavřít analýzu</div>
</div>

<script>
    const tasksMe = ["Vypni rádio v autě.", "Dnes bez ironie.", "Studená sprcha.", "10 dechů před domem."];
    const tasksHer = ["Polož jí ruku na rameno.", "Udělej jí čaj.", "Ukliď kuchyň.", "Napiš jí SMS teď."];
    
    let groundingStep = 0;
    const groundingText = ["5 věcí, které VIDÍŠ", "4 věci - DOTYK", "3 věci - SLUCH", "2 věci - VŮNĚ", "1 věc - CHUŤ", "Jsi zpátky."];

    function startSOS(type) {
        document.getElementById('sos-modal').style.display = 'flex';
        const circle = document.getElementById('breath-circle');
        const inst = document.getElementById('sos-instruction');
        circle.style.display = 'block';
        if(type === 'anger') { inst.innerText = "VZTEK: DÝCHEJ S KRUHEM"; circle.className = 'breath-circle animate-anger'; }
        else if(type === 'anxiety') { inst.innerText = "ÚZKOST: POMALÉ UVOLNĚNÍ"; circle.className = 'breath-circle animate-anxiety'; }
        else if(type === 'ground') { circle.style.display = 'none'; groundingStep = 0; nextGrounding(); }
    }

    function nextGrounding() {
        if(groundingStep < groundingText.length) {
            document.getElementById('sos-instruction').innerHTML = `<div style="color:var(--gold); font-size:1.4rem;">${groundingText[groundingStep]}</div><br><button onclick="nextGrounding()" style="background:var(--gold); border:none; padding:10px 20px; border-radius:10px; font-weight:bold; color:#0f172a;">MÁM</button>`;
            groundingStep++;
        }
    }

    function stopSOS() { document.getElementById('sos-modal').style.display = 'none'; }

    function sendSignal() {
        const msg = "Ahoj lasko, jsi skvela mama a vazim si te. Vecer jsem v tom s tebou. ❤️";
        const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
        window.location.href = isIOS ? `sms:&body=${encodeURIComponent(msg)}` : `sms:?body=${encodeURIComponent(msg)}`;
    }

    function saveEntry() {
        const entry = {
            ts: Date.now(),
            date: new Date().toLocaleDateString(),
            anger: parseInt(document.getElementById('anger-level').value),
            anxiety: parseInt(document.getElementById('anxiety-level').value),
            victory: document.getElementById('victory').value,
            note: document.getElementById('note').value
        };
        let logs = JSON.parse(localStorage.getItem('calm_logs_v3') || '[]');
        logs.push(entry);
        localStorage.setItem('calm_logs_v3', JSON.stringify(logs));
        alert("Dnešek uložen.");
        updateStats();
    }

    function generateReport() {
        const logs = JSON.parse(localStorage.getItem('calm_logs_v3') || '[]');
        if (logs.length < 3) { alert("Potřebuji alespoň 3 dny dat pro analýzu."); return; }
        
        const week = logs.slice(-7);
        const avgAnger = week.reduce((a, b) => a + b.anger, 0) / week.length;
        const avgAnxiety = week.reduce((a, b) => a + b.anxiety, 0) / week.length;
        const totalVictories = week.filter(l => l.victory.trim().length > 0).length;

        let verdict = "";
        let advice = "";

        if (avgAnger < 1 && avgAnxiety < 1) {
            verdict = "ZENOVÝ MISTR";
            advice = "Tento týden jsi byl pro rodinu stabilním majákem. Skvělá práce!";
        } else if (avgAnger < 2 && avgAnxiety >= 3) {
            verdict = "PEVNÁ SKÁLA (TIŠÍ TRPITEL)";
            advice = "Navenek jsi klidný, ale vnitřně se spaluješ úzkostí. Pozor na vyhoření. O víkendu musíš vypnout úplně.";
        } else if (avgAnger >= 3) {
            verdict = "BOUŘLIVÉ OBDOBÍ";
            advice = "Vztek tento týden vítězil. Zkus víc používat SOS tlačítko UZEMNĚNÍ hned při prvním náznaku sevření.";
        } else {
            verdict = "STATEČNÝ BOJOVNÍK";
            advice = "Bojuješ s úzkostí i vztekem, ale vítězství (${totalVictories}) ukazují, že se nevzdáváš. Pokračuj v mikro-krocích.";
        }

        document.getElementById('report-body').innerHTML = `
            <span class="summary-title">TÝDENNÍ ANALÝZA</span>
            <p style="margin-bottom:15px;">Za posledních 7 záznamů:</p>
            <div style="margin-bottom:10px;">📉 Průměrná úzkost: <b>${avgAnxiety.toFixed(1)}/5</b></div>
            <div style="margin-bottom:10px;">🔥 Průměrný vztek: <b>${avgAnger.toFixed(1)}/5</b></div>
            <div style="margin-bottom:15px;">🏆 Počet vítězství: <b>${totalVictories}x</b></div>
            <hr style="border:0; border-top:1px dashed var(--text-dim); margin:15px 0;">
            <p style="color:var(--gold); font-weight:bold; font-size:1.1rem; margin-bottom:5px;">${verdict}</p>
            <p style="font-size:0.9rem; line-height:1.4;">${advice}</p>
        `;
        document.getElementById('report-modal').style.display = 'flex';
    }

    function updateStats() {
        const logs = JSON.parse(localStorage.getItem('calm_logs_v3') || '[]');
        const streak = logs.filter(l => l.anger < 3).length;
        document.getElementById('streak-days').innerText = `${streak} dní`;
        document.getElementById('bat-fill').style.width = Math.min(streak * 10, 100) + '%';
        const list = document.getElementById('history-list');
        list.innerHTML = logs.slice(-5).reverse().map(l => `
            <div class="history-item">
                <b>${l.date}</b> | <span class="tag tag-anger">V: ${l.anger}</span> <span class="tag tag-anxiety">Ú: ${l.anxiety}</span>
                <div style="margin-top:4px; opacity:0.8;">${l.victory}</div>
            </div>
        `).join('');
    }

    window.onload = function() {
        const day = new Date().getDate() % tasksMe.length;
        document.getElementById('task-me').querySelector('p').innerText = tasksMe[day];
        document.getElementById('task-her').querySelector('p').innerText = tasksHer[day % tasksHer.length];
        updateStats();
    };
</script>
</body>
</html>
